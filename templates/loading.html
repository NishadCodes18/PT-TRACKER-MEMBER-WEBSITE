<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - Member Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap');

        :root {
            --primary: #f97316;
            --primary-hover: #ea6c0a;
            --accent: #facc15;
            --bg-base: #0a0a0f;
            --bg-card: #111118;
            --bg-elevated: #1a1a24;
            --border: rgba(255,255,255,0.08);
            --border-glow: rgba(249,115,22,0.4);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: 'MB';
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 40vw;
            font-weight: 900;
            color: rgba(249,115,22,0.03);
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
            user-select: none;
            line-height: 1;
            z-index: 0;
        }

        .loading-container {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 500px;
            padding: 20px;
        }

        .loading-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 24px;
            margin-bottom: 24px;
            font-size: 56px;
            box-shadow: 0 8px 32px rgba(249,115,22,0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(249,115,22,0.3); }
            50% { transform: scale(1.05); box-shadow: 0 12px 48px rgba(249,115,22,0.5); }
        }

        .loading-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .loading-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .loading-bar-container {
            width: 100%;
            height: 4px;
            background: var(--bg-card);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            border-radius: 999px;
        }

        @keyframes loading {
            0% { width: 0%; background-position: 0% 50%; }
            50% { width: 70%; background-position: 100% 50%; }
            100% { width: 100%; background-position: 0% 50%; }
        }

        .loading-message {
            font-size: 14px;
            color: var(--text-muted);
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-logo">🏋️</div>
        <h1 class="loading-title">Member Portal</h1>
        <p class="loading-subtitle">Loading your membership details...</p>

        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>

        <p class="loading-message">Connecting to database...</p>
    </div>

    <script>
        const messages = [
            'Connecting to database...',
            'Loading your information...',
            'Almost ready...'
        ];
        let messageIndex = 0;
        const messageEl = document.querySelector('.loading-message');

        setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            messageEl.textContent = messages[messageIndex];
        }, 2000);

        let attempts = 0;
        const maxAttempts = 30;

        function checkHealth() {
            fetch('/health')
                .then(res => res.json())
                .then(data => {
                    if (data.ok && data.db_initialized) {
                        window.location.href = '/';
                    } else {
                        attempts++;
                        if (attempts < maxAttempts) {
                            setTimeout(checkHealth, 1000);
                        } else {
                            messageEl.textContent = 'Taking longer than expected, redirecting...';
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 2000);
                        }
                    }
                })
                .catch(() => {
                    attempts++;
                    if (attempts < maxAttempts) {
                        setTimeout(checkHealth, 1500);
                    } else {
                        messageEl.textContent = 'Redirecting to application...';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 2000);
                    }
                });
        }

        setTimeout(checkHealth, 1000);
    </script>
</body>
</html>
